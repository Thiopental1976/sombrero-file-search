<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2740"/>
      <stop offset="1" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5aa9ff"/>
      <stop offset="1" stop-color="#37e0c8"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2fbff"/>
      <stop offset="0.4" stop-color="#8fd4ff"/>
      <stop offset="1" stop-color="#37e0c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="disk" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5aa9ff" stop-opacity="0.85"/>
      <stop offset="0.75" stop-color="#37e0c8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#37e0c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fundo squircle navy -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="51.5" fill="none" stroke="#3a4a66" stroke-width="1.5"/>

  <!-- "linhas de arquivo" desaparecendo ao fundo (busca sobre os arquivos) -->
  <g stroke="url(#accent)" stroke-width="9" stroke-linecap="round" opacity="0.13">
    <line x1="150" y1="190" x2="206" y2="190"/>
    <line x1="126" y1="210" x2="206" y2="210"/>
  </g>

  <!-- Galáxia Sombrero (M104) dentro da lente: bojo brilhante sobre a faixa
       escura de poeira, disco visto de perfil. Dimensionada para caber na lente
       (r=60) sem depender de clip-path (renderizadores como o QtSvg ignoram clip). -->
  <g transform="rotate(-17 112 116)">
    <!-- halo/disco -->
    <ellipse cx="112" cy="116" rx="57" ry="20" fill="url(#disk)"/>
    <ellipse cx="112" cy="116" rx="57" ry="20" fill="none" stroke="url(#accent)" stroke-width="1.6" opacity="0.45"/>
    <!-- bojo central luminoso -->
    <ellipse cx="112" cy="112" rx="25" ry="20" fill="url(#core)"/>
    <circle cx="112" cy="110" r="8" fill="#f4fcff"/>
    <!-- faixa escura de poeira, cortando o meio -->
    <ellipse cx="112" cy="119" rx="57" ry="7" fill="#0c111c" opacity="0.92"/>
  </g>

  <!-- lente + cabo da lupa -->
  <g fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round">
    <circle cx="112" cy="116" r="60"/>
    <line x1="156" y1="160" x2="202" y2="206"/>
  </g>
  <circle cx="112" cy="116" r="60" fill="#5aa9ff" opacity="0.06"/>
</svg>
